# =============================================================================
# Agent Memory System - Nginx 反向代理配置
# 安装: sudo cp agent-memory.conf /etc/nginx/conf.d/
# 验证: sudo nginx -t
# 重载: sudo systemctl reload nginx
# =============================================================================

# 上游服务定义
upstream agent_memory_backend {
    # 后端Java应用服务器
    server 127.0.0.1:8080 max_fails=3 fail_timeout=30s;

    # 连接池优化
    keepalive 32;
}

# WebSocket上游（如需分离）
upstream agent_memory_ws {
    server 127.0.0.1:8080 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# HTTP → HTTPS 重定向（可选，取消注释启用）
# server {
#     listen 80;
#     server_name memory.example.com;
#     return 301 https://$server_name$request_uri;
# }

# 主服务配置
server {
    listen 80;
    # listen 443 ssl http2;  # 取消注释启用HTTPS
    server_name memory.example.com;

    # ========================================================================
    # SSL配置（启用HTTPS时取消注释）
    # ========================================================================
    # ssl_certificate     /etc/nginx/ssl/agent-memory.crt;
    # ssl_certificate_key /etc/nginx/ssl/agent-memory.key;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    # ssl_prefer_server_ciphers off;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout 1d;

    # ========================================================================
    # 安全头
    # ========================================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' ws: wss:;" always;

    # ========================================================================
    # 日志配置
    # ========================================================================
    access_log /var/log/nginx/agent-memory-access.log;
    error_log  /var/log/nginx/agent-memory-error.log warn;

    # ========================================================================
    # Gzip压缩
    # ========================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # ========================================================================
    # 静态文件服务（Dashboard）
    # ========================================================================
    location /dashboard {
        alias /opt/agent-memory-system/web/dashboard;
        try_files $uri $uri/ /dashboard/index.html;

        # 静态资源缓存
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, no-transform";
            access_log off;
        }

        # 禁止访问隐藏文件
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # ========================================================================
    # Prometheus Metrics 代理（内部访问）
    # ========================================================================
    location /metrics {
        # 仅允许内部和监控网络访问
        # allow 10.0.0.0/8;
        # allow 172.16.0.0/12;
        # allow 192.168.0.0/16;
        # deny all;

        proxy_pass http://127.0.0.1:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 禁止缓存metrics
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ========================================================================
    # WebSocket代理
    # ========================================================================
    location /ws {
        proxy_pass http://agent_memory_ws;
        proxy_http_version 1.1;

        # WebSocket必要的头部
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时配置
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # 禁用缓冲
        proxy_buffering off;
    }

    # ========================================================================
    # 健康检查端点
    # ========================================================================
    location /health {
        proxy_pass http://agent_memory_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 健康检查不记录日志
        access_log off;
    }

    # ========================================================================
    # API反向代理
    # ========================================================================
    location /api/ {
        proxy_pass http://agent_memory_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 连接超时
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # 请求体大小限制
        client_max_body_size 10m;

        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ========================================================================
    # 根路径 → 重定向到Dashboard
    # ========================================================================
    location = / {
        return 302 /dashboard/;
    }

    # ========================================================================
    # 默认处理
    # ========================================================================
    location / {
        proxy_pass http://agent_memory_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========================================================================
    # 限制请求频率（防止滥用）
    # ========================================================================
    # 限流区域定义（放在server外部效果更好，这里简化处理）
    # limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    # location /api/ {
    #     limit_req zone=api_limit burst=50 nodelay;
    #     proxy_pass http://agent_memory_backend;
    #     ...
    # }

    # ========================================================================
    # 禁止访问敏感文件
    # ========================================================================
    location ~ /\.(git|env|config\.bak|\.swp) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(log|sql|bak)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
